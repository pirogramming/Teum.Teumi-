{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teum.Teumi</title>
    <link href="{% static 'interests/css/base.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
<div id="header">
    <div class="div-container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/>
            </svg>
        </div>
        <div class="header-context">
            <div><strong>새로운 친구 찾기</strong></div>
            <div class="comment">✨ 나와 맞는 특별한 사람을 만나보세요</div>
        </div>
    </div>
    <div class="search">
        <input class="search-input" type="text" placeholder="원하는 시간대나 관심사로 검색해보세요...">
            <svg class="search-svg" id="filter" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-funnel" viewBox="0 0 16 16">
                <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2z"/>
            </svg>
    </div>
</div>
<!--<form action="#" method="post">-->
    <div id="body">
        {% block content %} {% endblock %}
    </div>
<!--</form>-->
<div id="footer" class="bottom-nav">
    <div class="nav-container">
        <button class="nav-item" onclick="setCurrentPage('home')">
            <div class="nav-emoji">🏠</div>
            <span class="nav-label">홈</span>
        </button>
        <button class="nav-item active" onclick="setCurrentPage('browse')">
            <div class="nav-emoji">🔍</div>
            <span class="nav-label">탐색</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('chat-list')">
            <div class="nav-emoji">💬</div>
            <span class="nav-label">대화</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('matching')">
            <div class="nav-emoji">🤝</div>
            <span class="nav-label">매칭</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('mypage')">
            <div class="nav-emoji">👤</div>
            <span class="nav-label">마이</span>
        </button>
    </div>
</div>
</body>
{% block extra_js %}{% endblock %}
</html>
