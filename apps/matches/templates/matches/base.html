{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teum.Teumi</title>
    <link href="{% static 'matches/css/base.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
<div id="header">
    <div class="div-container">
        <div class="icon">🤝</div>
        <div class="header-context">
            <div><strong>내 매칭 현황</strong></div>
            <div class="comment">대화 신청과 완료된 만남들을 관리해요</div>
        </div>
    </div>
</div>
<!--<form action="#" method="post">-->
    <div id="body">
        {% block content %} {% endblock %}
    </div>
<!--</form>-->
<div id="footer" class="bottom-nav">
    <div class="nav-container">
        <button class="nav-item" onclick="setCurrentPage('home')">
            <div class="nav-emoji">🏠</div>
            <span class="nav-label">홈</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('browse')">
            <div class="nav-emoji">🔍</div>
            <span class="nav-label">탐색</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('chat-list')">
            <div class="nav-emoji">💬</div>
            <span class="nav-label">대화</span>
        </button>
        <button class="nav-item active" onclick="setCurrentPage('matching')">
            <div class="nav-emoji">🤝</div>
            <span class="nav-label">매칭</span>
        </button>
        <button class="nav-item" onclick="setCurrentPage('mypage')">
            <div class="nav-emoji">👤</div>
            <span class="nav-label">마이</span>
        </button>
    </div>
</div>
</body>
{% block extra_js %}{% endblock %}
</html>
