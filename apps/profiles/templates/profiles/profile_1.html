{% extends 'profiles/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'profiles/css/profile_1.css' %}">
{% endblock %}

{% block content %}
<div id="header">
    <div id="header-div">
        <div id="header-grid">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/>
            </svg>
            <div>
                <div class="title"><strong>나만의 프로필 만들기</strong></div>
                <div><span class="progress-text">✨ 1/5단계 - 차근차근 함께해요</span></div>
            </div>
            <div></div>
        </div>
        <div class="progress"><progress id="progress" value="1" min="0" max="5"></progress></div>
    </div>
</div>
<form method="POST" action="#" id="profile-form">
{% csrf_token %}
<div id="body">
    <div>
        <div class="icon">
            <div>🎓</div>
        </div>
        <div class="question-container">
            <div class="question"><h2>어느 학교에 다니세요?</h2></div>
            <div class="question">같은 캠퍼스 친구들과 더 쉽게 만날 수 있어요</div>
        </div>
        <div class="section-container">
            <div class="section">
                <div class="select-text">🏫 <strong>대학교</strong></div>
                <select name="school_name" id="university" class="selectbox" required>
                    <option selected disabled value="">다니고 계신 대학교를 선택해주세요</option>
                    {% for uni in universities %}
                    <option value="{{ uni }}">{{ uni }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="section">
                <div class="select-text">📚 <strong>학과</strong></div>
                <select name="department" id="major" class="selectbox" required>
                    <option selected disabled value="">전공하시는 학과를 선택해주세요</option>
                    {% for dep in departments %}
                    <option value="{{ dep }}">{{ dep }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="section">
                <div class="select-text">🎯 <strong>학년</strong></div>
                <select name="grade" id="grade" class="selectbox" required>
                    <option selected disabled value="">현재 학년을 선택해주세요</option>
                    <option value="1 학년">1학년</option>
                    <option value="2 학년">2학년</option>
                    <option value="3 학년">3학년</option>
                    <option value="4 학년">4학년</option>
                    <option value="대학원생">대학원생</option>
                </select>
            </div>
            <div class="section">
                <div class="select-text">🌱 <strong>나이</strong></div>
                <select name="age" id="age" class="selectbox" required>
                    <option selected disabled value="">현재 나이를 선택해주세요</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                    <option value="24">24</option>
                    <option value="25">25</option>
                    <option value="26">26</option>
                    <option value="27">27</option>
                    <option value="28">28</option>
                    <option value="29">29</option>
                </select>
            </div>
        </div>
    </div>
</div>
<div id="footer">
    <div>
        <button type="submit" id="next-button" disabled>
            다음으로 넘어가기
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-right" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"/>
            </svg>
        </button>
    </div>
</div>
</form>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // 1) 템플릿 변수로 전달된 토큰을 localStorage에 저장
    (function bootstrapToken() {
      const tmplAccess = "{{ access_token|default:''|escapejs }}";
      const tmplRefresh = "{{ refresh_token|default:''|escapejs }}";
      if (tmplAccess) localStorage.setItem('access', tmplAccess);
      if (tmplRefresh) localStorage.setItem('refresh', tmplRefresh);
    })();

    // 2) Authorization 헤더를 자동으로 붙여주는 fetch 헬퍼
    window.authFetch = (url, options = {}) => {
      const token = localStorage.getItem('access') || '';
      const headers = Object.assign(
        {},
        options.headers || {},
        { 'Authorization': token ? `Bearer ${token}` : '' }
      );
      return fetch(url, { ...options, headers });
    };

    // --- 엘리먼트 조회 ---
    const universitySelect = document.getElementById('university');
    const majorSelect = document.getElementById('major');
    const gradeSelect = document.getElementById('grade');
    const ageSelect = document.getElementById('age');
    const nextButton = document.getElementById('next-button');
    const profileForm = document.getElementById('profile-form');

    // 페이지에 요소가 없으면 조용히 종료 (공통 스크립트 안전 가드)
    if (!universitySelect || !majorSelect || !gradeSelect || !ageSelect || !nextButton || !profileForm) {
      console.warn('[profile_1] 필요한 엘리먼트 일부가 없습니다. 스크립트를 종료합니다.');
      return;
    }

    // 학교 선택 시 학과 목록 업데이트 (인증 필요하므로 authFetch 사용)
    if (universitySelect) {
      universitySelect.addEventListener('change', function () {
        const schoolName = this.value;
        if (schoolName) {
          authFetch(`/profiles/api/majors/?school_name=${encodeURIComponent(schoolName)}`)
            .then(response => response.json())
            .then(data => {
              majorSelect.innerHTML = '<option selected disabled value="">전공하시는 학과를 선택해주세요</option>';
              (data.majors || []).forEach(major => {
                const option = document.createElement('option');
                option.value = major;
                option.textContent = major;
                majorSelect.appendChild(option);
              });
              checkAllSelected();
            })
            .catch(error => {
              console.error('학과 목록 불러오기 실패:', error);
              alert('학과 목록을 불러오지 못했습니다. 인증 상태를 확인해주세요.');
            });
        }
      });
    }

    function checkAllSelected() {
      const allSelected = universitySelect.value &&
                          majorSelect.value &&
                          gradeSelect.value &&
                          ageSelect.value;
      nextButton.disabled = !allSelected;
    }

    // 각 셀렉트에 change 핸들러 (존재하는 요소만 바인딩)
    [universitySelect, majorSelect, gradeSelect, ageSelect]
      .filter(Boolean)
      .forEach(select => select.addEventListener('change', checkAllSelected));

    // 폼 제출 처리 (인증 필요하므로 authFetch 사용)
    if (profileForm) profileForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      const formData = {
        school_name: universitySelect.value,
        department: majorSelect.value,
        grade: gradeSelect.value,
        age: parseInt(ageSelect.value, 10)
      };

      try {
        const response = await authFetch('/profiles/api/school/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData),
        });

        if (response.ok) {
          // 다음 단계는 페이지 전용 URL로 이동
          window.location.href = '/profiles/step2/page/';
        } else {
          const error = await response.json().catch(() => ({}));
          alert('저장 중 오류가 발생했습니다: ' + JSON.stringify(error));
        }
      } catch (error) {
        console.error('저장 실패:', error);
        alert('저장 중 오류가 발생했습니다. 네트워크 상태를 확인해주세요.');
      }
    });

    // 초기 상태 확인 (필요 요소가 있을 때만)
    if (universitySelect && majorSelect && gradeSelect && ageSelect && typeof checkAllSelected === 'function') {
      checkAllSelected();
    }
  });
</script>
{% endblock %}
