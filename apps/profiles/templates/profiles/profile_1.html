{% extends 'base.html' %}
{% block content %}
<div id="header">
    <div>
        <div><strong>나만의 프로필 만들기</strong></div>
        <div><span>✨ 1/5단계 - 차근차근 함께해요</span></div>
        <div><progress id="progress" value="1" min="0" max="5"></progress></div>
    </div>
</div>
<div id="body">
    <div>
        <div>
            <div>🎓</div>
        </div>
        <div class="question">어느 학교에 다니세요?</div>
        <div>같은 캠퍼스 친구들과 더 쉽게 만날 수 있어요</div>
        <div class="section">
            <div class="select-text">🏫 <strong>대학교</strong></div>
            <select name="university" id="university">
                {% for in %} {% endfor %}
            </select>
        </div>
        <div class="section">
            <div class="select-text">📚 <strong>학과</strong></div>
            <select name="major" id="major">
                {% for in %} {% endfor %}
            </select>
        </div>
        <div class="section">
            <div class="select-text">🎯 <strong>학년</strong></div>
            <select name="grade" id="grade">
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
                <option value="5">대학원생</option>
            </select>
        </div>
        <div class="section">
            <div class="select-text">🌱 <strong>나이</strong></div>
            <select name="major" id="major">
                <option value="1">20</option>
                <option value="2">21</option>
                <option value="3">22</option>
                <option value="4">23</option>
                <option value="5">24</option>
                <option value="6">25</option>
                <option value="7">26</option>
                <option value="8">27</option>
                <option value="9">28</option>
                <option value="10">29</option>
            </select>
        </div>
    </div>
</div>
{% endblock %}
