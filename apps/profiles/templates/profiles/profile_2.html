{% extends 'base.html' %}
{% block content %}
<div id="header">
    <div>
        <div><strong>나만의 프로필 만들기</strong></div>
        <div><span>✨ 1/5단계 - 차근차근 함께해요</span></div>
        <div><progress id="progress" value="1" min="0" max="5"></progress></div>
    </div>
</div>
<div id="body">
    <div>
        <div>
            <div>🌱</div>
        </div>
        <div class="question">어떤 분야에 관심이 있으세요?</div>
        <div>같은 관심사를 가진 친구들과 연결해드릴게요</div>
        <div class="section">
            <div class="select-text">🏫 <strong>대학교</strong></div>
            <select name="university" id="university">
                {% for in %} {% endfor %}
            </select>
        </div>
        <div class="section">
            <div class="select-text">📚 <strong>학과</strong></div>
            <select name="major" id="major">
                {% for in %} {% endfor %}
            </select>
        </div>
        <div class="section">
            <div class="select-text">🎯 <strong>학년</strong></div>
            <select name="grade" id="grade">
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
                <option value="5">대학원생</option>
            </select>
        </div>
    </div>
</div>
{% endblock %}
