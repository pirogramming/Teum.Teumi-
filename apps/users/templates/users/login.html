{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}" />
    <title>Teum.Teumi</title>
    {% csrf_token %}
</head>
<body>
<div id="circle-1" class="circles"></div>
<div id="circle-2" class="circles"></div>
<div id="circle-3" class="circles"></div>
<div id="circle-4" class="circles"></div>
<div>
    <div class="header">
        <div class="header-logo">
            <div>☕</div>
        </div>
        <div class="header-title"><h1>틈틈이</h1></div>
        <div class="header-comment">공강에 피어나는 특별한 만남</div>
        <div><p class="header-explain">함께 성장하고, 서로 공감하며, 가벼운 대화로 시작해요</p></div>
    </div>
    <div class="body">
        <div>
            <div id="login-logo" class="login-logo">
                <button id="kakao" class="login" onclick="handleKakaoLogin()">
                    KaKao로 시작하기
                </button>
            </div>
            <div class="login-logo">
                <button id="google" class="login" onclick="handleGoogleLogin()">
                    Google로 시작하기
                </button>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>🌟 로그인하시면 <strong class="strong">이용약관</strong> 및 <strong class="strong">개인정보처리방침</strong>에 동의하시는 거예요</p>
        <p>처음이시라면 프로필을 차근차근 만들어가요!</p>
    </div>
</div>

<script>
// CSRF 토큰 가져오기
function getCSRFToken() {
    const token = document.querySelector('[name=csrfmiddlewaretoken]').value;
    return token;
}

// 카카오 로그인 처리
function handleKakaoLogin() {
    const button = document.getElementById('kakao');
    button.disabled = true;
    button.textContent = '로그인 중...';
    
    // 카카오 로그인 페이지로 이동
    window.location.href = '/users/login/kakao/';
}

// 구글 로그인 처리
function handleGoogleLogin() {
    const button = document.getElementById('google');
    button.disabled = true;
    button.textContent = '로그인 중...';
    
    // 구글 로그인 페이지로 이동
    window.location.href = '/users/login/google/';
}
</script>
</body>
</html>
