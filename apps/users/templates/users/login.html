{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}" />
    <title>Teum.Teumi</title>
</head>
<body>
<div id="circle-1" class="circles"></div>
<div id="circle-2" class="circles"></div>
<div id="circle-3" class="circles"></div>
<div id="circle-4" class="circles"></div>
<div>
    <div class="header">
        <div class="header-logo">
            <div>☕</div>
        </div>
        <div class="header-title"><h1>틈틈이</h1></div>
        <div class="header-comment">공강에 피어나는 특별한 만남</div>
        <div><p class="header-explain">함께 성장하고, 서로 공감하며, 가벼운 대화로 시작해요</p></div>
    </div>
    <div class="body">
        <div>
            <div id="login-logo" class="login-logo">
                <button id="kakao" class="login">
                    <a href="{% url 'users:kakao-login' %}">
                    KaKao로 시작하기
                    </a>
                </button>
            </div>
            <div class="login-logo">
                <button id="google" class="login">
                    <a  href="{% url 'users:google-login' %}">
                    Google로 시작하기
                    </a>
                </button>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>🌟 로그인하시면 <strong class="strong">이용약관</strong> 및 <strong class="strong">개인정보처리방침</strong>에 동의하시는 거예요</p>
        <!--일단 이용약관, 개인정보처리방침은 css 서식으로 처리, 나중에 링크 추가할 거면 수정할 수 있음-->
        <p>처음이시라면 프로필을 차근차근 만들어가요!</p>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    fetch('/api/token/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => {
        if (!res.ok) throw new Error("로그인 실패");
        return res.json();
    })
    .then(data => {
        // ✅ access, refresh 토큰 저장
        localStorage.setItem('access', data.access);
        localStorage.setItem('refresh', data.refresh);
        localStorage.setItem('user_email', data.user_email);

        // ✅ 로그인 성공 시 main.html로 이동
        window.location.href = "/main.html";
    })
    .catch(err => {
        alert("로그인 실패: " + err.message);
    });
});
</script>
</body>
</html>
