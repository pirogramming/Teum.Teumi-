{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}" />
    <title>Teum.Teumi</title>
    {% csrf_token %}
</head>
<body>
<div id="circle-1" class="circles"></div>
<div id="circle-2" class="circles"></div>
<div id="circle-3" class="circles"></div>
<div id="circle-4" class="circles"></div>
<div>
    <div class="header">
        <div class="header-logo">
            <div>☕</div>
        </div>
        <div class="header-title"><h1>틈틈이</h1></div>
        <div class="header-comment">공강에 피어나는 특별한 만남</div>
        <div><p class="header-explain">함께 성장하고, 서로 공감하며, 가벼운 대화로 시작해요</p></div>
    </div>
    <div class="body">
        <div>
            <div id="login-logo" class="login-logo">
                <button id="kakao" class="login" onclick="handleKakaoLogin()">
                    KaKao로 시작하기
                </button>
            </div>
            <div class="login-logo">
                <button id="google" class="login" onclick="handleGoogleLogin()">
                    Google로 시작하기
                </button>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>🌟 로그인하시면 <strong class="strong">이용약관</strong> 및 <strong class="strong">개인정보처리방침</strong>에 동의하시는 거예요</p>
        <p>처음이시라면 프로필을 차근차근 만들어가요!</p>
    </div>
</div>

<script>
  {# 소셜 로그인 URL을 이름으로 역참조. 이름이 없으면 기본 경로를 사용 #}
  {% url 'users:kakao_login' as kakao_url %}
  {% url 'users:google_login' as google_url %}
  const KAKAO_URL = "{{ kakao_url|default:'/users/login/kakao/' }}";
  const GOOGLE_URL = "{{ google_url|default:'/users/login/google/' }}";

  // ==== 템플릿 변수 → localStorage 저장 & 인증 fetch 헬퍼 ====
  (function bootstrapTokenAndAuthFetch(){
    const tmplAccess = "{{ access_token|default:''|escapejs }}";
    const tmplRefresh = "{{ refresh_token|default:''|escapejs }}";
    if (tmplAccess) localStorage.setItem('access', tmplAccess);
    if (tmplRefresh) localStorage.setItem('refresh', tmplRefresh);

    async function refreshAccessToken() {
      const refresh = localStorage.getItem('refresh');
      if (!refresh) return null;
      try {
        const res = await fetch('/api/token/refresh/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh })
        });
        if (!res.ok) return null;
        const data = await res.json();
        if (data.access) {
          localStorage.setItem('access', data.access);
          return data.access;
        }
        return null;
      } catch { return null; }
    }

    window.authFetch = async (url, options = {}, tryRefresh = true) => {
      const token = localStorage.getItem('access') || '';
      const headers = { ...(options.headers || {}), Authorization: token ? `Bearer ${token}` : '' };
      let res = await fetch(url, { ...options, headers });
      if (res.status === 401 && tryRefresh) {
        const newAccess = await refreshAccessToken();
        if (newAccess) {
          const retryHeaders = { ...(options.headers || {}), Authorization: `Bearer ${newAccess}` };
          res = await fetch(url, { ...options, headers: retryHeaders });
        }
      }
      return res;
    };
  })();

  // ==== 소셜 로그인 버튼 핸들러 (onclick에서 참조) ====
  function handleKakaoLogin(){
    window.location.href = KAKAO_URL;
  }
  function handleGoogleLogin(){
    window.location.href = GOOGLE_URL;
  }

  // ==== 로그인 후 자동 네비게이션 ====
  (async function navigateAfterLogin(){
    // 토큰이 하나도 없으면(순수 로그인 페이지 진입) 아무것도 안 함
    const access = localStorage.getItem('access');
    const refresh = localStorage.getItem('refresh');
    if (!access && !refresh) return;

    try {
      const res = await authFetch('/profiles/profile/', { method: 'GET' });
      const data = await res.json();

      // API가 next_step(예: /profiles/step2/)을 주면 페이지 전용 URL로 변환
      const toPageUrl = (path) => {
        if (!path) return null;
        // /profiles/stepX/  →  /profiles/stepX/page/
        return path.replace(/(\/profiles\/step\d+\/)(?!page\/)/, '$1page/');
      };

      if (data.next_step) {
        const target = toPageUrl(data.next_step) || data.next_step;
        window.location.href = target;
        return;
      }

      if (data.current_step === 'completed') {
        // 프로필 홈으로
        window.location.href = '/profiles/profile/';
        return;
      }

      // current_step이 있으면 해당 페이지 전용 URL로
      const step = data.current_step;
      if (step && /^step\d+$/.test(step)) {
        window.location.href = `/profiles/${step}/page/`;
        return;
      }

      // 안전망: 홈으로
      window.location.href = '/profiles/profile/';
    } catch (e) {
      console.error('프로필 상태 확인 실패:', e);
      window.location.href = '/';
    }
  })();
</script>
</body>
</html>
